name: Release

on:
  push:
    branches:
      - main
    tags:
      - '**'
    paths:
      - '.github/workflows/**'
      - 'src/**'
      - 'tests/**'
      - 'sample_project/**'
      - 'setup.py'
      - 'pyproject.toml'
      - 'tox.ini'
  pull_request:

concurrency:
  group: ${{ github.head_ref || github.run_id }}
  cancel-in-progress: true

jobs:
  lint:
    name: Lint (flake8)
    runs-on: ubuntu-24.04
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v7

      - uses: actions/setup-python@v6
        with:
          python-version: '3.13'

      - name: Install uv
        uses: astral-sh/setup-uv@v8.2.0

      - name: Install dependencies
        run: uv pip install --system flake8
        # Bound so a stuck index resolve can't hang the job.
        timeout-minutes: 5

      - name: Run flake8
        # flake8 reads its [flake8] config from tox.ini.
        run: flake8 src tests
        timeout-minutes: 5

  typecheck:
    name: Type check (mypy)
    runs-on: ubuntu-24.04
    timeout-minutes: 10
    # Advisory for now: the codebase has a backlog of strict-mode errors to
    # burn down. Surface them on every run, but don't block merges yet.
    # Remove the `|| ...` wrapper once `mypy src/timescaledb` is clean.
    steps:
      - uses: actions/checkout@v7

      - uses: actions/setup-python@v6
        with:
          python-version: '3.13'

      - name: Install uv
        uses: astral-sh/setup-uv@v8.2.0

      - name: Install package and type deps
        # Installs the project (so mypy resolves its deps/stubs) plus mypy.
        # [tool.mypy] strict = true lives in pyproject.toml.
        run: uv pip install --system mypy .
        timeout-minutes: 5

      - name: Run mypy
        run: |
          mypy src/timescaledb || {
            echo "::warning::mypy reported strict-mode issues; advisory only until the backlog is fixed."
            exit 0
          }
        timeout-minutes: 5

  tests:
    name: Python ${{ matrix.python-version }}
    runs-on: ubuntu-24.04
    timeout-minutes: 20

    strategy:
      matrix:
        python-version:
        - '3.11'
        - '3.12'
        - '3.13'
        - '3.14'

    steps:
    - uses: actions/checkout@v7

    - uses: actions/setup-python@v6
      with:
        python-version: ${{ matrix.python-version }}
        allow-prereleases: true

    - name: Install uv
      uses: astral-sh/setup-uv@v8.2.0
      with:
        enable-cache: true
        cache-dependency-glob: tests/requirements/*.txt

    - name: Install dependencies
      run: uv pip install --system tox tox-uv

    - name: Run tox targets for ${{ matrix.python-version }}
      run: tox run -f py$(echo ${{ matrix.python-version }} | tr -d .)
      # Spins up a TimescaleDB container via testcontainers; bound so a stuck
      # pull/test can't hang the job.
      timeout-minutes: 15

    - name: Upload coverage data
      uses: actions/upload-artifact@v7
      with:
        name: coverage-data-${{ matrix.python-version }}
        path: '${{ github.workspace }}/.coverage.*'
        include-hidden-files: true
        if-no-files-found: warn
  
  coverage:
    name: Coverage
    runs-on: ubuntu-24.04
    timeout-minutes: 10
    needs: tests
    steps:
      - uses: actions/checkout@v7

      - uses: actions/setup-python@v6
        with:
          python-version: '3.12'

      - name: Install uv
        uses: astral-sh/setup-uv@v8.2.0

      - name: Install dependencies
        run: uv pip install --system coverage[toml]

      - name: Download data
        uses: actions/download-artifact@v8
        with:
          path: ${{ github.workspace }}
          pattern: coverage-data-*
          merge-multiple: true

      - name: Combine coverage and fail if it's <100%
        run: |
          coverage combine
          coverage report --fail-under=100

      - name: Upload HTML report
        if: ${{ failure() }}
        uses: actions/upload-artifact@v7
        with:
          name: html-report
          path: htmlcov
  
  release:
    if: success() && startsWith(github.ref, 'refs/tags/')
    runs-on: ubuntu-24.04
    timeout-minutes: 15
    environment: release

    permissions:
      contents: read
      id-token: write

    steps:
      - uses: actions/checkout@v7

      - uses: astral-sh/setup-uv@v8.2.0

      - name: Build
        run: uv build
        timeout-minutes: 5

      - uses: pypa/gh-action-pypi-publish@release/v1
        # External upload to PyPI; bound so a stalled upload can't hang the job.
        timeout-minutes: 10
